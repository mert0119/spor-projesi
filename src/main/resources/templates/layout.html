<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - FitOl">FitOl</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/}">
                <i class="fas fa-dumbbell"></i> FitOl
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/}"><i class="fas fa-home"></i> Ana Sayfa</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/food}"><i class="fas fa-utensils"></i> Yemek</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/food/photo}"><i class="fas fa-camera"></i> 📸 AI</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/exercise}"><i class="fas fa-running"></i> Egzersiz</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/water}"><i class="fas fa-tint"></i> Su</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/measurement}"><i class="fas fa-ruler"></i> Ölçüm</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/diet-plan}"><i class="fas fa-clipboard-list"></i> Diyet</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/calculator}"><i class="fas fa-calculator"></i> Hesapla</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/reports}"><i class="fas fa-chart-bar"></i> Raporlar</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/reminder}"><i class="fas fa-bell"></i> Hatırlatıcı</a></li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" th:href="@{/profile}"><i class="fas fa-user"></i> Profil</a></li>
                    <li class="nav-item">
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <button type="submit" class="nav-link btn btn-link"><i class="fas fa-sign-out-alt"></i> Çıkış</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Flash Messages -->
    <div class="container-fluid mt-5 pt-3">
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${info}" class="alert alert-info alert-dismissible fade show" role="alert">
            <span th:text="${info}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    </div>

    <!-- Content -->
    <main class="container-fluid py-3">
        <div layout:fragment="content"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script th:src="@{/js/app.js}"></script>
    <div layout:fragment="scripts"></div>
</body>
</html>
