<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}" lang="tr">
<head><title>Raporlar</title></head>
<body>
<div layout:fragment="content">
    <h4 class="page-title"><i class="fas fa-chart-bar"></i> <span th:text="${title}">Raporlar</span></h4>

    <div class="btn-group mb-4">
        <a th:href="@{/reports(period=daily)}" class="btn" th:classappend="${period == 'daily' ? 'btn-primary' : 'btn-outline-light'}">Günlük</a>
        <a th:href="@{/reports(period=weekly)}" class="btn" th:classappend="${period == 'weekly' ? 'btn-primary' : 'btn-outline-light'}">Haftalık</a>
        <a th:href="@{/reports(period=monthly)}" class="btn" th:classappend="${period == 'monthly' ? 'btn-primary' : 'btn-outline-light'}">Aylık</a>
    </div>

    <!-- Ozet Kartlari -->
    <div class="row g-3 mb-4">
        <div class="col-md-3"><div class="stat-card calories"><div class="stat-value" th:text="${totalCalories}">0</div><div class="stat-label">Toplam Kalori</div><div class="stat-sub" th:text="'Günlük ort: '+${avgDailyCalories}+' kcal'">0</div></div></div>
        <div class="col-md-3"><div class="stat-card exercise"><div class="stat-value" th:text="${exerciseTotalCal}">0</div><div class="stat-label">Yakılan Kalori</div><div class="stat-sub" th:text="${exerciseTotalMin}+' dk / '+${exerciseSessions}+' seans'">0</div></div></div>
        <div class="col-md-3"><div class="stat-card water"><div class="stat-value" th:text="${waterAvgDaily}">0</div><div class="stat-label">Ort. Su (ml/gün)</div><div class="stat-sub" th:text="'Toplam: '+${waterTotalMl}+' ml'">0</div></div></div>
        <div class="col-md-3"><div class="stat-card protein"><div class="stat-value" th:text="${totalProtein}">0</div><div class="stat-label">Toplam Protein (g)</div><div class="stat-sub" th:text="'Karb: '+${totalCarbs}+'g / Yağ: '+${totalFat}+'g'">0</div></div></div>
    </div>

    <!-- Grafik -->
    <div class="card glass-card mb-4">
        <div class="card-body"><h6>Kalori Giriş / Çıkış</h6><canvas id="reportChart" height="250"></canvas></div>
    </div>

    <!-- Top Listeler -->
    <div class="row g-3">
        <div class="col-md-6">
            <div class="card glass-card"><div class="card-body">
                <h6><i class="fas fa-utensils"></i> En Çok Yenen Yemekler</h6>
                <div th:if="${topFoods.isEmpty()}" class="text-muted small">Veri yok.</div>
                <table th:if="${!topFoods.isEmpty()}" class="table table-dark table-sm">
                    <thead><tr><th>Yemek</th><th>Sayı</th><th>Ort. Kalori</th></tr></thead>
                    <tbody><tr th:each="f : ${topFoods}"><td th:text="${f[0]}"></td><td th:text="${f[1]}"></td><td th:text="${#numbers.formatDecimal(f[2],1,1)}"></td></tr></tbody>
                </table>
            </div></div>
        </div>
        <div class="col-md-6">
            <div class="card glass-card"><div class="card-body">
                <h6><i class="fas fa-dumbbell"></i> En Çok Yapılan Egzersizler</h6>
                <div th:if="${topExercises.isEmpty()}" class="text-muted small">Veri yok.</div>
                <table th:if="${!topExercises.isEmpty()}" class="table table-dark table-sm">
                    <thead><tr><th>Egzersiz</th><th>Sayı</th><th>Toplam Kalori</th></tr></thead>
                    <tbody><tr th:each="e : ${topExercises}"><td th:text="${e[0]}"></td><td th:text="${e[1]}"></td><td th:text="${e[2]}"></td></tr></tbody>
                </table>
            </div></div>
        </div>
    </div>
</div>

<div layout:fragment="scripts">
<script th:inline="javascript">
    const labels = /*[[${labels}]]*/ [];
    const caloriesIn = /*[[${caloriesIn}]]*/ [];
    const caloriesOut = /*[[${caloriesOut}]]*/ [];
    const ctx = document.getElementById('reportChart');
    if (ctx) {
        new Chart(ctx, {
            type: 'bar', data: { labels: labels, datasets: [
                { label: 'Kalori Giriş', data: caloriesIn, backgroundColor: 'rgba(255,165,0,0.6)', borderRadius: 5 },
                { label: 'Kalori Yakılan', data: caloriesOut, backgroundColor: 'rgba(0,200,150,0.6)', borderRadius: 5 }
            ]}, options: { responsive: true, scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#aaa' } }, x: { grid: { display: false }, ticks: { color: '#aaa' } } } }
        });
    }
</script>
</div>
</body>
</html>
