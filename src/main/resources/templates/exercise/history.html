<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}" lang="tr">
<head><title>Egzersiz Geçmişi</title></head>
<body>
<div layout:fragment="content">
    <h4 class="page-title"><i class="fas fa-history"></i> Egzersiz Geçmişi</h4>
    <table class="table table-dark table-striped">
        <thead><tr><th>Tarih</th><th>Egzersiz</th><th>Kategori</th><th>Set×Tekrar</th><th>Ağırlık</th><th>Süre</th><th>Kalori</th></tr></thead>
        <tbody>
            <tr th:each="log : ${logs.content}">
                <td th:text="${log.date}"></td><td th:text="${log.exerciseName}"></td>
                <td th:text="${log.category}"></td><td th:text="${log.sets+'×'+log.reps}"></td>
                <td th:text="${log.weightKg+' kg'}"></td><td th:text="${log.duration+' dk'}"></td>
                <td th:text="${log.caloriesBurned}"></td>
            </tr>
        </tbody>
    </table>
    <div th:if="${logs.totalPages > 1}" class="d-flex justify-content-center">
        <a th:if="${logs.number > 0}" th:href="@{/exercise/history(page=${logs.number - 1})}" class="btn btn-sm btn-outline-light me-2">Önceki</a>
        <a th:if="${logs.number < logs.totalPages - 1}" th:href="@{/exercise/history(page=${logs.number + 1})}" class="btn btn-sm btn-outline-light">Sonraki</a>
    </div>
    <a th:href="@{/exercise}" class="btn btn-outline-light mt-3"><i class="fas fa-arrow-left"></i> Geri</a>
</div>
</body>
</html>
